<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Nasabah Baru - Multi Step</title>
    <style>
        /* [CSS sebelumnya tetap sama, tambahkan ini] */
        
        .step-container {
            display: none;
        }
        .step-container.active {
            display: block;
        }
        
        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            gap: 10px;
        }
        
        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            background: #e1e5e9;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .step.active {
            background: #667eea;
            transform: scale(1.1);
        }
        
        .step.completed {
            background: #28a745;
        }
        
        .step.completed::after {
            content: '✓';
            position: absolute;
            font-size: 18px;
        }
        
        .step.active::after {
            content: '';
        }
        
        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn-prev, .btn-next {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-prev {
            background: #6c757d;
            color: white;
        }
        
        .btn-next {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-prev:hover:not(:disabled), .btn-next:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn-prev:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        @media (max-width: 480px) {
            .nav-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="header">
            <h1>📋 Registrasi Nasabah</h1>
            <p>Langkah 1 dari 3 - Lengkapi data secara bertahap</p>
        </div>

        <form id="registrationForm">
            <div class="step-indicator" id="stepIndicator">
                <div class="step active" data-step="1">1</div>
                <div class="step" data-step="2">2</div>
                <div class="step" data-step="3">3</div>
            </div>

            <!-- STEP 1: Data Pribadi -->
            <div class="step-container active" data-step="1">
                <h3 style="color: #333; margin-bottom: 20px; font-size: 18px;">Data Diri Nasabah</h3>
                
                <div class="form-group">
                    <label for="nama">Nama Lengkap *</label>
                    <input type="text" id="nama" name="nama" required>
                    <div class="error-message" id="err-nama"></div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required>
                        <div class="error-message" id="err-email"></div>
                    </div>
                    <div class="form-group">
                        <label for="noHp">No. HP *</label>
                        <input type="tel" id="noHp" name="noHp" required>
                        <div class="error-message" id="err-noHp"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="alamat">Alamat Lengkap *</label>
                    <textarea id="alamat" name="alamat" required></textarea>
                    <div class="error-message" id="err-alamat"></div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="kota">Kota *</label>
                        <select id="kota" name="kota" required>
                            <option value="">Pilih Kota</option>
                            <option value="Jakarta">Jakarta</option>
                            <option value="Bandung">Bandung</option>
                            <option value="Surabaya">Surabaya</option>
                            <option value="Medan">Medan</option>
                            <option value="Semarang">Semarang</option>
                            <option value="Yogyakarta">Yogyakarta</option>
                            <option value="Makassar">Makassar</option>
                        </select>
                        <div class="error-message" id="err-kota"></div>
                    </div>
                    <div class="form-group">
                        <label for="kodePos">Kode Pos</label>
                        <input type="text" id="kodePos" name="kodePos">
                    </div>
                </div>

                <div class="nav-buttons">
                    <button type="button" class="btn-prev" id="prev1" disabled>Lanjut</button>
                    <button type="button" class="btn-next" id="next1">Lanjut ke Data Pasangan →</button>
                </div>
            </div>

            <!-- STEP 2: Data Pasangan -->
            <div class="step-container" data-step="2">
                <h3 style="color: #333; margin-bottom: 20px; font-size: 18px;">Data Pasangan</h3>
                
                <div class="form-group">
                    <label for="namaPasangan">Nama Lengkap Pasangan *</label>
                    <input type="text" id="namaPasangan" name="namaPasangan" required>
                    <div class="error-message" id="err-namaPasangan"></div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="emailPasangan">Email Pasangan</label>
                        <input type="email" id="emailPasangan" name="emailPasangan">
                    </div>
                    <div class="form-group">
                        <label for="noHpPasangan">No. HP Pasangan *</label>
                        <input type="tel" id="noHpPasangan" name="noHpPasangan" required>
                        <div class="error-message" id="err-noHpPasangan"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="pekerjaanPasangan">Pekerjaan Pasangan *</label>
                    <select id="pekerjaanPasangan" name="pekerjaanPasangan" required>
                        <option value="">Pilih Pekerjaan</option>
                        <option value="Karyawan Swasta">Karyawan Swasta</option>
                        <option value="PNS/TNI/POLRI">PNS/TNI/POLRI</option>
                        <option value="Wiraswasta">Wiraswasta</option>
                        <option value="Dokter">Dokter</option>
                        <option value="Pengacara">Pengacara</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                    <div class="error-message" id="err-pekerjaanPasangan"></div>
                </div>

                <div class="nav-buttons">
                    <button type="button" class="btn-prev" id="prev2">← Kembali</button>
                    <button type="button" class="btn-next" id="next2">Lanjut ke Konfirmasi →</button>
                </div>
            </div>

            <!-- STEP 3: Konfirmasi -->
            <div class="step-container" data-step="3">
                <h3 style="color: #333; margin-bottom: 20px; font-size: 18px;">Konfirmasi Data</h3>
                
                <div style="background: #f8f9fa; padding: 20px; border-radius: 12px; margin-bottom: 20px;">
                    <h4>📋 Data Nasabah:</h4>
                    <p><strong>Nama:</strong> <span id="previewNama">-</span></p>
                    <p><strong>Email:</strong> <span id="previewEmail">-</span></p>
                    <p><strong>HP:</strong> <span id="previewNoHp">-</span></p>
                </div>

                <div style="background: #f8f9fa; padding: 20px; border-radius: 12px; margin-bottom: 20px;">
                    <h4>💑 Data Pasangan:</h4>
                    <p><strong>Nama:</strong> <span id="previewNamaPasangan">-</span></p>
                    <p><strong>HP:</strong> <span id="previewNoHpPasangan">-</span></p>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="setuju" name="setuju" required>
                    <label for="setuju">
                        Saya setuju dengan <a href="#" style="color: #667eea; text-decoration: none;">Syarat & Ketentuan</a> *
                    </label>
                </div>
                <div class="error-message" id="err-setuju" style="text-align: center;"></div>

                <div class="nav-buttons">
                    <button type="button" class="btn-prev" id="prev3">← Kembali</button>
                    <button type="submit" class="btn-next" id="submitBtn">✅ Daftar Sekarang</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        // [CSS dan validasi sebelumnya tetap sama, tambahkan ini]
        
        let currentStep = 1;
        const totalSteps = 3;
        
        // Update header step
        function updateHeader() {
            const headerP = document.querySelector('.header p');
            headerP.textContent = `Langkah ${currentStep} dari ${totalSteps}`;
        }
        
        // Update step indicator
        function updateStepIndicator() {
            document.querySelectorAll('.step').forEach((step, index) => {
                const stepNum = index + 1;
                step.classList.remove('active', 'completed');
                
                if (stepNum < currentStep) {
                    step.classList.add('completed');
                } else if (stepNum === currentStep) {
                    step.classList.add('active');
                }
            });
        }
        
        // Show specific step
        function showStep(stepNum) {
            document.querySelectorAll('.step-container').forEach(container => {
                container.classList.remove('active');
            });
            document.querySelector(`[data-step="${stepNum}"]`).classList.add('active');
            
            currentStep = stepNum;
            updateStepIndicator();
            updateHeader();
            
            // Scroll to top
            document.getElementById('mainContainer').scrollIntoView({ behavior: 'smooth' });
        }
        
        // Validate current step
        function validateCurrentStep() {
            let isValid = true;
            const stepFields = {
                1: ['nama', 'email', 'noHp', 'alamat', 'kota'],
                2: ['namaPasangan', 'noHpPasangan', 'pekerjaanPasangan'],
                3: ['setuju']
            };
            
            stepFields[currentStep].forEach(id => {
                const input = document.getElementById(id);
                if (!input.value.trim()) {
                    validateField(id);
                    isValid = false;
                }
            });
            
            return isValid;
        }
        
        // Next step
        function nextStep() {
            if (validateCurrentStep()) {
                if (currentStep < totalSteps) {
                    showStep(currentStep + 1);
                }
            }
        }
        
        // Previous step
        function prevStep() {
            if (currentStep > 1) {
                showStep(currentStep - 1);
            }
        }
        
        // Update preview data
        function updatePreview() {
            document.getElementById('previewNama').textContent = document.getElementById('nama').value || '-';
            document.getElementById('previewEmail').textContent = document.getElementById('email').value || '-';
            document.getElementById('previewNoHp').textContent = document.getElementById('noHp').value || '-';
            document.getElementById('previewNamaPasangan').textContent = document.getElementById('namaPasangan').value || '-';
            document.getElementById('previewNoHpPasangan').textContent = document.getElementById('noHpPasangan').value || '-';
        }
        
        // Event listeners untuk navigation
        document.getElementById('next1').addEventListener('click', nextStep);
        document.getElementById('next2').addEventListener('click', nextStep);
        
        document.getElementById('prev2').addEventListener('click', prevStep);
        document.getElementById('prev3').addEventListener('click', prevStep);
        
        // Real-time preview update
        ['nama', 'email', 'noHp', 'namaPasangan', 'noHpPasangan'].forEach(id => {
            document.getElementById(id).addEventListener('input', updatePreview);
        });
        
        // Tambah validasi untuk field baru
        ['namaPasangan', 'noHpPasangan', 'pekerjaanPasangan'].forEach(id => {
            const input = document.getElementById(id);
            input.addEventListener('blur', () => validateField(id));
            input.addEventListener('input', () => clearError(id));
        });
        
        // Validasi tambahan untuk field baru
        function validateField(id) {
            const input = document.getElementById(id);
            const errorEl = document.getElementById(`err-${id}`);
            let isValid = true;
            let errorMsg = '';

            if (!input.value.trim()) {
                isValid = false;
                errorMsg = 'Field ini wajib diisi';
            } else if ((id === 'email' || id === 'emailPasangan') && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input.value)) {
                isValid = false;
                errorMsg = 'Format email tidak valid';
            } else if ((id === 'noHp' || id === 'noHpPasangan') && !/^\d{10,13}$/.test(input.value.replace(/\D/g, ''))) {
                isValid = false;
                errorMsg = 'No. HP minimal 10 digit';
            }

            if (!isValid) {
                input.classList.add('error');
                errorEl.textContent = errorMsg;
                errorEl.style.display = 'block';
            } else {
                input.classList.remove('error');
                errorEl.style.display = 'none';
            }
        }
        
        // Form submit (tetap sama seperti sebelumnya)
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (!document.getElementById('setuju').checked) {
                document.getElementById('err-setuju').textContent = 'Anda harus menyetujui Syarat & Ketentuan';
                document.getElementById('err-setuju').style.display = 'block';
                return;
            }

            const originalText = submitBtn.textContent;
            submitBtn.textContent = '⏳ Memproses...';
            submitBtn.disabled = true;

            setTimeout(() => {
                const nama = document.getElementById('nama').value;
                const email = document.getElementById('email').value;
                
                container.innerHTML = `
                    <div class="success-final">
                        <h2>🎉 Selamat!</h2>
                        <p><strong>${nama}</strong>,<br>Data registrasi Anda telah berhasil tersimpan.</p>
                        <p>📧 Konfirmasi akan dikirim ke: <strong>${email}</strong></p>
                        <p><small>ID Registrasi: #NAS${Date.now().toString().slice(-6)}</small></p>
                        <button onclick="location.reload()" class="btn">📝 Registrasi Baru</button>
                    </div>
                `;
            }, 2000);
        });
        
        // Inisialisasi preview
        updatePreview();
    </script>
</body>
</html>
