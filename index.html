<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Nasabah Baru</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .error {
            border-color: #ff4444 !important;
        }

        .error-message {
            color: #ff4444;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row .form-group {
            flex: 1;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 25px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            transform: scale(1.2);
            margin-top: 2px;
        }

        .checkbox-group label {
            margin: 0;
            font-weight: normal;
            font-size: 13px;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .success-final {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            padding: 40px;
            text-align: center;
        }

        .success-final h2 {
            color: #155724;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .success-final p {
            color: #155724;
            margin-bottom: 25px;
            font-size: 16px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
                margin: 10px;
            }
            
            .row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="header">
            <h1>📋 Registrasi Nasabah</h1>
            <p>Silahkan lengkapi data Anda untuk registrasi</p>
        </div>

        <form id="registrationForm">
            <div class="success-message" id="tempSuccess"></div>
            
            <div class="form-group">
                <label for="nama">Nama Lengkap *</label>
                <input type="text" id="nama" name="nama" required>
                <div class="error-message" id="err-nama"></div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                    <div class="error-message" id="err-email"></div>
                </div>
                <div class="form-group">
                    <label for="noHp">No. HP *</label>
                    <input type="tel" id="noHp" name="noHp" required>
                    <div class="error-message" id="err-noHp"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="alamat">Alamat Lengkap *</label>
                <textarea id="alamat" name="alamat" required></textarea>
                <div class="error-message" id="err-alamat"></div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="kota">Kota *</label>
                    <select id="kota" name="kota" required>
                        <option value="">Pilih Kota</option>
                        <option value="Jakarta">Jakarta</option>
                        <option value="Bandung">Bandung</option>
                        <option value="Surabaya">Surabaya</option>
                        <option value="Medan">Medan</option>
                        <option value="Semarang">Semarang</option>
                        <option value="Yogyakarta">Yogyakarta</option>
                        <option value="Makassar">Makassar</option>
                    </select>
                    <div class="error-message" id="err-kota"></div>
                </div>
                <div class="form-group">
                    <label for="kodePos">Kode Pos</label>
                    <input type="text" id="kodePos" name="kodePos">
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="setuju" name="setuju">
                <label for="setuju">
                    Saya setuju dengan <a href="#" style="color: #667eea; text-decoration: none;">Syarat & Ketentuan</a> *
                </label>
            </div>
            <div class="error-message" id="err-setuju" style="text-align: center;"></div>

            <button type="submit" class="btn" id="submitBtn">Daftar Sekarang</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('registrationForm');
        const submitBtn = document.getElementById('submitBtn');
        const tempSuccess = document.getElementById('tempSuccess');
        const container = document.getElementById('mainContainer');

        // Validasi real-time
        ['nama', 'email', 'noHp', 'alamat', 'kota'].forEach(id => {
            const input = document.getElementById(id);
            input.addEventListener('blur', () => validateField(id));
            input.addEventListener('input', () => clearError(id));
        });

        document.getElementById('setuju').addEventListener('change', () => {
            clearError('setuju');
        });

        function validateField(id) {
            const input = document.getElementById(id);
            const errorEl = document.getElementById(`err-${id}`);
            let isValid = true;
            let errorMsg = '';

            if (!input.value.trim()) {
                isValid = false;
                errorMsg = 'Field ini wajib diisi';
            } else if (id === 'email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input.value)) {
                isValid = false;
                errorMsg = 'Format email tidak valid';
            } else if (id === 'noHp' && !/^\d{10,13}$/.test(input.value.replace(/\D/g, ''))) {
                isValid = false;
                errorMsg = 'No. HP minimal 10 digit';
            }

            if (!isValid) {
                input.classList.add('error');
                errorEl.textContent = errorMsg;
                errorEl.style.display = 'block';
            } else {
                input.classList.remove('error');
            }
        }

        function clearError(id) {
            const input = document.getElementById(id);
            const errorEl = document.getElementById(`err-${id}`);
            input.classList.remove('error');
            errorEl.style.display = 'none';
        }

        function validateForm() {
            let isValid = true;
            
            ['nama', 'email', 'noHp', 'alamat', 'kota'].forEach(id => {
                validateField(id);
                if (!document.getElementById(id).value.trim()) isValid = false;
            });

            if (!document.getElementById('setuju').checked) {
                document.getElementById('err-setuju').textContent = 'Anda harus menyetujui Syarat & Ketentuan';
                document.getElementById('err-setuju').style.display = 'block';
                isValid = false;
            }

            return isValid;
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (!validateForm()) {
                return;
            }

            // Simulasi proses
            const originalText = submitBtn.textContent;
            submitBtn.textContent = '⏳ Memproses...';
            submitBtn.disabled = true;

            setTimeout(() => {
                // Tampilkan pesan sukses sementara
                tempSuccess.innerHTML = `
                    ✅ <strong>Registrasi Berhasil!</strong><br>
                    Data nasabah sedang disimpan ke database...
                `;
                tempSuccess.style.display = 'block';

                // Simulasi finalisasi
                setTimeout(() => {
                    const nama = document.getElementById('nama').value;
                    const email = document.getElementById('email').value;
                    
                    container.innerHTML = `
                        <div class="success-final">
                            <h2>🎉 Selamat!</h2>
                            <p><strong>${nama}</strong>,<br>Data registrasi Anda telah berhasil tersimpan.</p>
                            <p>📧 Konfirmasi akan dikirim ke: <strong>${email}</strong></p>
                            <p><small>ID Registrasi: #NAS${Date.now().toString().slice(-6)}</small></p>
                            <button onclick="location.reload()" class="btn">
                                📝 Registrasi Baru
                            </button>
                            <p style="margin-top: 20px; font-size: 12px; opacity: 0.8;">
                                Atau tunggu 5 detik untuk otomatis refresh...
                            </p>
                        </div>
                    `;

                    // Auto refresh setelah 5 detik
                    setTimeout(() => {
                        location.reload();
                    }, 5000);
                }, 1500);
            }, 2000);
        });
    </script>
</body>
</html>
